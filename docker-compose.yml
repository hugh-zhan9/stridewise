services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stridewise
      POSTGRES_PASSWORD: stridewise
      POSTGRES_DB: stridewise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/api", "-conf", "/app/config/config.yaml"]
    depends_on:
      - postgres
      - redis
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/worker", "-conf", "/app/config/config.yaml"]
    depends_on:
      - postgres
      - redis
    environment:
      TZ: Asia/Shanghai

volumes:
  pgdata:
